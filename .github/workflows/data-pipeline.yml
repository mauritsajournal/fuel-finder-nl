name: Data Pipeline

on:
  schedule:
    - cron: '0 */4 * * *'  # Fuel prices every 4 hours
    - cron: '0 6 * * *'    # POI data daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      include_poi:
        description: 'Also fetch POI data'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # --- Fuel prices (every run) ---
      - name: Fetch fuel prices from ANWB
        id: fetch
        run: python scripts/fetch_fuel_prices.py
        continue-on-error: true

      - name: Retry fetch on failure
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "First attempt failed, retrying in 30s..."
          sleep 30
          python scripts/fetch_fuel_prices.py

      - name: Split fuel data into tiles
        run: python scripts/tile_data.py --data-type fuel

      # --- POI data (daily or manual) ---
      - name: Fetch POI data from Overpass
        id: fetch_poi
        if: github.event.schedule == '0 6 * * *' || github.event.inputs.include_poi == 'true'
        run: python scripts/fetch_poi.py
        continue-on-error: true

      - name: Retry POI fetch on failure
        if: (github.event.schedule == '0 6 * * *' || github.event.inputs.include_poi == 'true') && steps.fetch_poi.outcome == 'failure'
        run: |
          echo "POI fetch failed, retrying in 30s..."
          sleep 30
          python scripts/fetch_poi.py

      - name: Split POI data into tiles
        if: (github.event.schedule == '0 6 * * *' || github.event.inputs.include_poi == 'true') && steps.fetch_poi.outcome == 'success'
        run: python scripts/tile_data.py --data-type poi

      # --- Upload to R2 ---
      - name: Upload fuel tiles to R2
        run: |
          python scripts/upload_to_r2.py data/output/tiles/fuel --prefix tiles/fuel
          python scripts/upload_to_r2.py data/output --prefix ""
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Upload POI tiles to R2
        if: (github.event.schedule == '0 6 * * *' || github.event.inputs.include_poi == 'true') && steps.fetch_poi.outcome == 'success'
        run: python scripts/upload_to_r2.py data/output/tiles/poi --prefix tiles/poi
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
